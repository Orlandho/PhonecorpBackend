# Perfil: production (Ubuntu 24.04)
# Variables de entorno requeridas:
#   export DB_URL=jdbc:sqlserver://IP_SQL_SERVER:1433;databaseName=DB_PhoneCorp;encrypt=true;trustServerCertificate=true
#   export DB_USERNAME=sa
#   export DB_PASSWORD=tuPasswordSegura
#   export CORS_ALLOWED_ORIGIN=http://IP_O_DOMINIO_DEL_FRONTEND
#   java -jar -Dspring.profiles.active=prod PhonecorpBackend-1.0-SNAPSHOT.jar

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.show-sql=false

# Puerto HTTP
server.port=8080

# CORS (origen del frontend)
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN}

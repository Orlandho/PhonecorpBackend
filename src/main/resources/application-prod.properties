# Perfil: production (Ubuntu 24.04)
# Variables de entorno requeridas:
#   export DB_URL=jdbc:sqlserver://IP_SQL_SERVER:1433;databaseName=DB_PhoneCorp;encrypt=true;trustServerCertificate=true
#   export DB_USERNAME=sa
#   export DB_PASSWORD=tuPasswordSegura
#   export SSL_PASSWORD=Admin123!
#   export CORS_ALLOWED_ORIGIN=https://IP_O_DOMINIO_DEL_FRONTEND
#   java -jar -Dspring.profiles.active=prod PhonecorpBackend-1.0-SNAPSHOT.jar

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.show-sql=false

# HTTPS
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=file:/root/keystore.p12
server.ssl.key-store-password=${SSL_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=phonecorp-ssl

# CORS (origen del frontend)
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN}

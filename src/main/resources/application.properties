# Perfil activo por defecto: development (local)
spring.profiles.active=dev

# Configuracion JPA comun a todos los perfiles
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Usa los nombres EXACTOS de @Table/@Column sin convertir PascalCase a snake_case.
# Sin esta linea, Spring aplica SpringPhysicalNamingStrategy que convierte
# OrdenVenta -> orden_venta, DetalleOrden -> detalle_orden, etc.,
# causando que los FK constraints del script SQL apunten a tablas que Hibernate no usa.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

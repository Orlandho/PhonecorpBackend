spring.datasource.url=jdbc:sqlserver://LAPTOP-VB6I49QM:1433;databaseName=DB_PhoneCorp;encrypt=true;trustServerCertificate=true;integratedSecurity=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Usa los nombres EXACTOS de @Table/@Column sin convertir PascalCase a snake_case.
# Sin esta linea, Spring aplica SpringPhysicalNamingStrategy que convierte
# OrdenVenta -> orden_venta, DetalleOrden -> detalle_orden, etc.,
# causando que los FK constraints del script SQL apunten a tablas que Hibernate no usa.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Perfil: production (Ubuntu 24.04)
# Los valores se leen de variables de entorno del sistema operativo.
# Ejemplo de como setearlas antes de correr el JAR:
#   export DB_URL=jdbc:sqlserver://IP_DEL_SERVER:1433;databaseName=DB_PhoneCorp;encrypt=true;trustServerCertificate=true
#   export DB_USERNAME=sa
#   export DB_PASSWORD=tuPasswordSegura
#   java -jar -Dspring.profiles.active=prod PhonecorpBackend-1.0-SNAPSHOT.jar

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.show-sql=false
